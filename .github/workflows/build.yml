name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
            ext: '.exe'
          - os: macos-13
            target: x86_64-apple-darwin
            platform: darwin-x64
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare release (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.platform }}/bin
          mkdir -p release
          BIN_SRC="target/${{ matrix.target }}/release/reptool${{ matrix.ext }}"
          cp "$BIN_SRC" "npm/${{ matrix.platform }}/bin/reptool${{ matrix.ext }}"
          chmod +x "npm/${{ matrix.platform }}/bin/reptool${{ matrix.ext }}"
          cp "$BIN_SRC" "release/reptool${{ matrix.ext }}"
          cd release && zip "reptool-${{ matrix.platform }}.zip" "reptool${{ matrix.ext }}" && rm "reptool${{ matrix.ext }}" && cd ..

      - name: Prepare release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path npm/${{ matrix.platform }}/bin
          New-Item -ItemType Directory -Force -Path release
          $binSrc = "target/${{ matrix.target }}/release/reptool${{ matrix.ext }}"
          Copy-Item $binSrc "npm/${{ matrix.platform }}/bin/reptool${{ matrix.ext }}"
          Copy-Item $binSrc "release/reptool${{ matrix.ext }}"
          Compress-Archive -Path "release/reptool${{ matrix.ext }}" -DestinationPath "release/reptool-${{ matrix.platform }}.zip"
          Remove-Item "release/reptool${{ matrix.ext }}"

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: npm/${{ matrix.platform }}/

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm/
          merge-multiple: true

      - name: List downloaded files
        run: find npm/ -type f | head -50

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd npm/reptool
          npm version "$VERSION" --no-git-tag-version
          cd ..
          for platform in win32-x64 linux-x64 darwin-x64 darwin-arm64; do
            if [ -d "$platform" ]; then
              cd "$platform"
              npm version "$VERSION" --no-git-tag-version
              cd ..
            fi
          done
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('reptool/package.json', 'utf8'));
          for (const dep in pkg.optionalDependencies) {
            pkg.optionalDependencies[dep] = '$VERSION';
          }
          fs.writeFileSync('reptool/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform packages to npm
        run: |
          cd npm
          for platform in win32-x64 linux-x64 darwin-x64 darwin-arm64; do
            if [ -d "$platform" ]; then
              echo "Publishing reptool-${platform}@${{ steps.version.outputs.VERSION }}"
              cd "$platform"
              npm publish --access public
              cd ..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package to npm
        run: |
          cd npm/reptool
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all npm artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: npm/
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@ice-a'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package versions for GPR
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd npm/reptool
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.name = '@ice-a/reptool';
          pkg.repository.url = 'git+https://github.com/ice-a/spider-cli.git';
          pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
          for (const dep in pkg.optionalDependencies) {
            pkg.optionalDependencies[dep] = '$VERSION';
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd ..
          for platform in win32-x64 linux-x64 darwin-x64 darwin-arm64; do
            if [ -d "$platform" ]; then
              cd "$platform"
              node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.name = '@ice-a/' + pkg.name;
              pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
              "
              cd ..
            fi
          done

      - name: Publish platform packages to GPR
        run: |
          cd npm
          for platform in win32-x64 linux-x64 darwin-x64 darwin-arm64; do
            if [ -d "$platform" ]; then
              echo "Publishing @ice-a/reptool-${platform}@${{ steps.version.outputs.VERSION }}"
              cd "$platform"
              npm publish --access public
              cd ..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish main package to GPR
        run: |
          cd npm/reptool
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release/
          merge-multiple: true

      - name: Rename release files with version
        run: |
          cd release
          for f in reptool-*.zip; do
            mv "$f" "reptool-v${{ steps.version.outputs.VERSION }}-${f#reptool-}"
          done
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}